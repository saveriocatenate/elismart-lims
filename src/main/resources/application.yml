# Base configuration — datasource and h2 settings are in profile-specific files.
# Run with --spring.profiles.active=dev (default) or --spring.profiles.active=prod.
spring:
  application:
    name: elismart-lims

  profiles:
    default: dev

  jackson:
    deserialization:
      fail-on-unknown-properties: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.0-flash}
  timeout-ms: ${GEMINI_TIMEOUT_MS:120000}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:8501}

logging:
  level:
    # LangChain4j logs request/response details at INFO by default; suppress to WARN
    # to avoid leaking prompt content and API metadata into production logs.
    dev.langchain4j: WARN
