# Development profile — H2 file-based database with browser console enabled.
spring:
  datasource:
    url: jdbc:h2:file:./data/elismart_db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
