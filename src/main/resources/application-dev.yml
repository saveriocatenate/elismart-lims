# Development profile — H2 file-based database with browser console enabled.
spring:
  datasource:
    url: jdbc:h2:file:./data/elismart_db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false                 # SQL routed through SLF4J, not stdout
    properties:
      hibernate:
        format_sql: true            # multi-line, indented SQL in logs

logging:
  level:
    # Application code
    it.elismart_lims: DEBUG
    # SQL statements (Hibernate 6 / Spring Boot 3)
    org.hibernate.SQL: DEBUG
    # Bind parameters for each query
    org.hibernate.orm.jdbc.bind: TRACE
